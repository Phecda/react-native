# Centralised workflow that performs every `npm publish` in this repo.
#
# Why this exists: npmjs.com Trusted Publishing accepts only ONE
# (org, repo, workflow_filename, environment) tuple per package.
# npm matches the `workflow_ref` OIDC claim — which is always the
# TOP-LEVEL workflow, not a reusable child. Using `workflow_dispatch`
# makes this file the top-level workflow, so the OIDC claim is always
# `publish-npm.yml` regardless of which workflow dispatched the run.
#
# Callers (publish-release.yml, nightly.yml, publish-bumped-packages.yml)
# build and `npm pack` their packages, upload the tarballs as a
# `npm-tarballs` artifact, then dispatch this workflow to publish them.
#
# See https://docs.npmjs.com/trusted-publishers and
# https://docs.github.com/en/actions/security-for-github-actions/security-hardening-your-deployments/about-security-hardening-with-openid-connect .
name: Publish to npm

on:
  workflow_dispatch:
    inputs:
      source-run-id:
        description: "Workflow run ID that produced the npm-tarballs artifact."
        required: true
        type: string

permissions:
  id-token: write # OIDC token for npm Trusted Publishing
  contents: read
  actions: read # download artifacts from the source workflow run

jobs:
  publish:
    runs-on: ubuntu-latest
    if: github.repository == 'react/react-native'
    environment: npm-publish
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Validate source run
        uses: actions/github-script@v8
        with:
          script: |
            const runId = parseInt('${{ inputs.source-run-id }}', 10);
            const {data: run} = await github.rest.actions.getWorkflowRun({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: runId,
            });

            // Only accept artifacts from known publish workflows
            const ALLOWED_WORKFLOWS = [
              'publish-release.yml',
              'nightly.yml',
              'publish-bumped-packages.yml',
            ];
            const workflowName = run.path.split('/').pop();
            if (!ALLOWED_WORKFLOWS.includes(workflowName)) {
              core.setFailed(
                `Source run ${runId} is from workflow "${run.path}" — ` +
                `only runs from ${ALLOWED_WORKFLOWS.join(', ')} are accepted.`
              );
              return;
            }

            // Must have completed successfully
            if (run.status !== 'completed' || run.conclusion !== 'success') {
              core.setFailed(
                `Source run ${runId} has status=${run.status}, conclusion=${run.conclusion}. ` +
                `Only successful runs are accepted.`
              );
              return;
            }

            // Must be on a protected ref (main, *-stable, or a version tag)
            const ref = run.head_branch || '';
            const isProtectedRef =
              ref === 'main' ||
              /^\d+-stable$/.test(ref) ||
              /^v0\.\d+\.\d+/.test(run.display_title);
            if (!isProtectedRef) {
              core.setFailed(
                `Source run ${runId} ran on ref "${ref}" which is not a protected branch or release tag.`
              );
              return;
            }

            console.log(`✅ Source run ${runId} validated:`);
            console.log(`   Workflow: ${workflowName}`);
            console.log(`   Ref: ${ref}`);
            console.log(`   Conclusion: ${run.conclusion}`);
      - name: Setup node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22.14.0"
          registry-url: "https://registry.npmjs.org"
      - name: Download tarballs from source run
        uses: actions/download-artifact@v4
        with:
          name: npm-tarballs
          path: ./npm-tarballs
          run-id: ${{ inputs.source-run-id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Publish packages
        run: node ./scripts/releases-ci/publish-from-tarballs.js ./npm-tarballs
      - name: Upload npm logs
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: npm-publish-logs
          path: ~/.npm/_logs
